<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Jogo - PlayU</title>
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/main.js"></script>
</head>
<body class="player-room-body" style="margin: 0; overflow: hidden; background: #000; height: 100vh;">

    <div id="loading-overlay" class="loading-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div class="loader"></div>
        <p style="margin-top: 15px; color: var(--secondary-color); font-family: 'Orbitron', sans-serif;">Conectando à Sessão...</p>
    </div>

    <div class="player-video-container" style="position: relative; width: 100%; height: 100%;">
        
        <video id="player-remote-video-host" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
        
        <video id="player-local-video" autoplay muted playsinline style="position: absolute; bottom: 90px; right: 20px; width: 150px; height: 200px; object-fit: cover; border-radius: 12px; border: 2px solid var(--secondary-color); box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 10;"></video>

        <div id="player-timer-container" style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--secondary-color); z-index: 10;">
            <div id="player-timer-display" style="font-size: 2rem; font-family: 'Orbitron', sans-serif; color: #fff; line-height: 1;">00:00</div>
        </div>

        <div class="player-controls" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 15px 25px; border-radius: 50px; z-index: 15; border: 1px solid #333;">
            <button id="player-mic-btn" class="control-btn" title="Microfone" style="background: #333; border: none; color: white; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; display: flex; justify-content: center; align-items: center;">
                <ion-icon name="mic-outline"></ion-icon>
            </button>
            <button id="player-cam-btn" class="control-btn" title="Câmera" style="background: #333; border: none; color: white; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; display: flex; justify-content: center; align-items: center;">
                <ion-icon name="videocam-outline"></ion-icon>
            </button>
            <button id="player-leave-btn" class="control-btn danger" title="Sair" style="background: #ff4444; border: none; color: white; width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; display: flex; justify-content: center; align-items: center;">
                <ion-icon name="log-out-outline"></ion-icon>
            </button>
        </div>
    </div>

    <script src="assets/js/sala.js"></script>
</body>
</html>
